<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interface | Watson Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0070f3;
            --accent: #00dfd8;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Canvas handles scroll feel */
            height: 100vh;
        }

        /* Animated Background Canvas */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Main UI Container */
        .dashboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
            background: radial-gradient(circle at center, rgba(0, 112, 243, 0.1) 0%, transparent 70%);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.7; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Watson Button Positioning Hack (Optional) */
        #WACLauncherContainer {
            right: 30px !important;
            bottom: 30px !important;
        }
    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <main class="dashboard">
        <div class="glass-card">
            <div class="status-container">
                <div class="pulse-dot"></div>
                <span>SYSTEMS OPERATIONAL</span>
            </div>
            <h1>Watson Assistant</h1>
            <p>Welcome to the next generation of neural interaction. Your AI concierge is ready to assist. Click the chat icon in the bottom right to initiate a secure uplink.</p>
            
            <div style="font-family: 'Space Mono'; font-size: 12px; color: #555;">
                INTEGRATION ID: 87D5...4EE3
            </div>
        </div>
    </main>

    <!-- Interactive Background Script -->
    <script>
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 223, 216, 0.5)";
            ctx.strokeStyle = "rgba(0, 223, 216, 0.05)";

            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();
    </script>

    <!-- Watson Assistant Script -->
    <script>
        window.watsonAssistantChatOptions = {
            integrationID: "87d53ae1-3fb3-4396-a685-8e18cf2be5e3", 
            region: "eu-de", 
            serviceInstanceID: "81a9001c-05e8-4c4d-a874-cceb1407c3fa", 
            onLoad: async (instance) => { await instance.render(); }
        };
        setTimeout(function(){
            const t = document.createElement('script');
            t.src = "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
            document.head.appendChild(t);
        });
    </script>
</body>
</html>
